## Disable networking.
set multiplayer 0

## Create named pipe on startup if it doesn't exist.
set named_pipe 0

# Set the location of the main Lua file.
set lua_main lua

# This makes it so we can't accidentally break things.
suDisguise 0

create integer sensitivity
set sensitivity 2


## a, left array
# keys_createFullBind("k_100", "key_strafeLeft", "key_strafeLeft_d", "key_strafeLeft_u")
create command +key_strafeLeft
create command -key_strafeLeft
bind k_100 +key_strafeLeft -key_strafeLeft
# keys_createFullBind("k_1073741903", "key_leftarrow", "key_strafeLeft_d", "key_strafeLeft_u")
